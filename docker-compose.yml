services:
  mongo:
    image: mongo:7
    container_name: pushupclash-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-pushupclash}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-pushupclash}
      MONGO_INITDB_DATABASE: pushupclash
    volumes:
      - ./.data/mongo:/data/db
